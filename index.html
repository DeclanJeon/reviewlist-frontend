<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== Primary SEO ===== -->
    <title>ReviewLink — 진솔한 리뷰, 함께하는 대화</title>
    <meta name="description" content="ReviewLink는 다양한 서비스와 제품에 대한 진솔한 리뷰를 공유하고, 댓글로 소통하는 리뷰 커뮤니티입니다. 맛집·앱·영화·음악 등 모든 분야의 리뷰를 직접 작성해보세요." />
    <meta name="keywords" content="리뷰, 후기, 리뷰커뮤니티, 제품리뷰, 서비스리뷰, ReviewLink, 맛집후기, 앱리뷰, 영화리뷰" />
    <meta name="author" content="ReviewLink" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#f97316" />

    <!-- ===== Favicon ===== -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ===== Open Graph (Facebook, KakaoTalk, etc.) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ReviewLink" />
    <meta property="og:title" content="ReviewLink — 진솔한 리뷰, 함께하는 대화" />
    <meta property="og:description" content="다양한 서비스와 제품에 대한 진솔한 리뷰를 공유하고, 댓글로 소통하는 리뷰 커뮤니티입니다." />
    <meta property="og:image" content="/og-image.webp" />
    <meta property="og:image:type" content="image/webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ReviewLink 로고 및 소개 이미지" />
    <meta property="og:locale" content="ko_KR" />

    <!-- ===== Twitter Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ReviewLink — 진솔한 리뷰, 함께하는 대화" />
    <meta name="twitter:description" content="다양한 서비스와 제품에 대한 진솔한 리뷰를 공유하고, 댓글로 소통하는 리뷰 커뮤니티입니다." />
    <meta name="twitter:image" content="/og-image.webp" />
    <meta name="twitter:image:alt" content="ReviewLink 소개 이미지" />

    <!-- ===== PWA Manifest ===== -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ===== Canonical ===== -->
    <link rel="canonical" href="/" />

    <!-- ===== Structured Data (JSON-LD) ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ReviewLink",
      "description": "다양한 서비스와 제품에 대한 진솔한 리뷰를 공유하고 댓글로 소통하는 리뷰 커뮤니티",
      "inLanguage": "ko-KR",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ReviewLink",
      "logo": {
        "@type": "ImageObject",
        "url": "/logo.webp",
        "width": 512,
        "height": 512
      },
      "description": "리뷰 커뮤니티 플랫폼"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

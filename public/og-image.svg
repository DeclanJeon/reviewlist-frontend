<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf9f7"/>
      <stop offset="100%" style="stop-color:#fff7ed"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="180" fill="#f97316" opacity="0.06"/>
  <circle cx="100" cy="580" r="140" fill="#f97316" opacity="0.05"/>
  <circle cx="1080" cy="580" r="90" fill="#f97316" opacity="0.04"/>

  <!-- Card shadow / container -->
  <rect x="80" y="80" width="1040" height="470" rx="32" fill="white" opacity="0.7"/>
  <rect x="80" y="80" width="1040" height="470" rx="32" fill="none" stroke="#f97316" stroke-width="2" opacity="0.15"/>

  <!-- Icon background -->
  <rect x="160" y="170" width="160" height="160" rx="36" fill="url(#iconBg)"/>

  <!-- Speech bubble in icon -->
  <path d="M188 200 H300 Q308 200 308 208 V272 Q308 280 300 280 H264 L252 296 L252 280 H188 Q180 280 180 272 V208 Q180 200 188 200 Z" fill="white" opacity="0.95"/>

  <!-- Star in bubble -->
  <path d="M244 215 L248.4 227.2 H261.6 L251.1 234.3 L255.4 246.5 L244 239.4 L232.6 246.5 L236.9 234.3 L226.4 227.2 H239.6 Z" fill="#f97316"/>

  <!-- Brand name -->
  <text x="360" y="238" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#1a1a1a" letter-spacing="-2">Review</text>
  <text x="360" y="318" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#f97316" letter-spacing="-2">Link</text>

  <!-- Tagline -->
  <text x="160" y="430" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#6b7280" letter-spacing="0.5">진솔한 리뷰, 함께하는 대화</text>

  <!-- Accent dots -->
  <circle cx="160" cy="490" r="6" fill="#f97316" opacity="0.4"/>
  <circle cx="178" cy="490" r="6" fill="#f97316" opacity="0.25"/>
  <circle cx="196" cy="490" r="6" fill="#f97316" opacity="0.15"/>
</svg>
